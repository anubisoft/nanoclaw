name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "container/**"
      - "package*.json"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: CI & Deploy
    runs-on: [self-hosted, linux, production]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run

      - name: Deploy NanoClaw
        run: ./scripts/deploy.sh

      - name: Show logs on failure
        if: failure()
        run: journalctl --user -u nanoclaw --no-pager -n 50 || true
